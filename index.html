<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy - AI Application Engineer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho+ATF:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --line-color: rgba(200, 210, 220, 0.35);
      --line-color-bright: rgba(200, 210, 220, 0.6);
      --text-primary: #e0e6ed;
      --text-secondary: rgba(180, 190, 200, 0.7);
      --accent: #7eb8da;
      --bg-dark: #060b18;
    }

    html, body {
      height: 100%;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, rgba(25, 35, 80, 0.4) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(15, 25, 60, 0.3) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, #0d1229 0%, #060b18 100%);
      color: var(--text-primary);
      font-family: 'Shippori Mincho ATF', serif;
      width: 100vw;
      overflow: hidden;
    }

    /* Fixed canvas that spans the full viewport across all sections */
    #globe-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      cursor: grab;
      touch-action: pan-y;
    }

    #globe-canvas:active {
      cursor: grabbing;
    }

    .page-section {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
    }

    /* ============ Page 1 ============ */
    .content-overlay {
      position: absolute;
      top: clamp(5.5rem, 15vh, 9rem);
      left: 0;
      z-index: 10;
      text-align: left;
      font-family: 'Shippori Mincho ATF', serif;
      pointer-events: none;
      padding-left: clamp(2rem, 5vw, 4.5rem);
      transition: opacity 0.7s ease, transform 0.8s ease;
    }

    .intro-section h1 {
      margin: 0;
    }

    .role-label {
      display: block;
      font-size: 1.00rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(239, 236, 228, 0.55);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 0.5s forwards;
    }

    .name-title {
      display: block;
      margin-top: 1.25rem;
      font-size: clamp(1.8rem, 3.8vw, 3.4rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: #efece4;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.55);
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 0.8s forwards;
    }

    .focus-areas {
      display: flex;
      align-items: center;
      margin: 1.25rem 0 0 0;
      padding: 0;
      list-style: none;
      font-size: 1.00rem;
      letter-spacing: 0.1em;
      line-height: 1.9;
      color: rgba(239, 236, 228, 0.8);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 1.1s forwards;
    }

    .focus-areas li {
      display: flex;
      align-items: center;
    }

    .focus-areas li .slash {
      margin: 0 0.25rem;
      color: rgba(239, 236, 228, 0.55);
    }

    .focus-areas li .keyword {
      color: rgba(239, 236, 228, 0.8);
      white-space: nowrap;
    }

    .page-nav {
      position: absolute;
      right: clamp(1.5rem, 4vw, 3rem);
      bottom: clamp(1.5rem, 4vh, 3rem);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.8s forwards;
    }

    .page-nav-button {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(180, 210, 240, 0.28);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(8, 14, 32, 0.36);
      color: rgba(230, 240, 250, 0.82);
      cursor: pointer;
      pointer-events: auto;
      backdrop-filter: blur(10px);
      transition: opacity 0.25s ease, border-color 0.25s ease, background 0.25s ease, transform 0.25s ease;
    }

    .page-nav-button:hover:not(:disabled) {
      border-color: rgba(255, 220, 150, 0.58);
      background: rgba(255, 190, 90, 0.12);
      transform: translateY(-1px);
    }

    .page-nav-button:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .page-nav-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .page-nav-label {
      font-family: 'Shippori Mincho ATF', serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Drag hint */
    .drag-hint {
      position: absolute;
      left: 58%;
      top: 50%;
      transform: translate(-50%, calc(50% + clamp(80px, 18vh, 160px)));
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      animation: dragHintAppear 1s ease-out 1.6s forwards;
    }

    .drag-hint.hidden {
      opacity: 0 !important;
      animation: none;
    }

    .drag-hint-icon {
      position: relative;
      width: 64px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(180, 210, 240, 0.75);
    }

    .drag-hint-icon svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drag-hint-hand {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      color: rgba(220, 235, 250, 0.95);
      animation: dragHandSwing 2.6s ease-in-out infinite;
    }

    .drag-hint-hand svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drag-hint span {
      font-family: 'Shippori Mincho ATF', serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    @keyframes dragHintAppear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes dragHandSwing {
      0%   { transform: translate(-50%, -50%) translateX(-18px); opacity: 0.4; }
      15%  { opacity: 1; }
      50%  { transform: translate(-50%, -50%) translateX(18px); opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(-18px); opacity: 0.4; }
    }

    /* ============ Page 2 - China Map ============ */
    .map-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.8s ease 0.1s, transform 0.9s ease 0.1s;
    }

    .map-overlay.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .map-overlay .map-title {
      position: absolute;
      top: clamp(4rem, 10vh, 7rem);
      left: clamp(2rem, 5vw, 4.5rem);
      font-family: 'Shippori Mincho ATF', serif;
    }

    .map-overlay .map-title .eyebrow {
      display: block;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(239, 236, 228, 0.55);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
    }

    .map-overlay .map-title .main {
      display: block;
      margin-top: 0.9rem;
      font-size: clamp(1.6rem, 3.2vw, 2.8rem);
      font-weight: 700;
      line-height: 1.1;
      color: #efece4;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.6);
    }

    .map-overlay .map-title .sub {
      display: block;
      margin-top: 0.6rem;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      color: rgba(239, 236, 228, 0.7);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
    }

    .map-overlay .map-meta {
      position: absolute;
      right: clamp(2rem, 5vw, 4.5rem);
      bottom: clamp(3rem, 8vh, 5rem);
      text-align: right;
      font-family: 'Shippori Mincho ATF', serif;
      color: rgba(239, 236, 228, 0.55);
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
    }

    .map-overlay .map-meta .coord {
      display: block;
      margin-top: 0.5rem;
      color: rgba(255, 200, 130, 0.85);
      font-size: 0.75rem;
      letter-spacing: 0.25em;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .content-overlay {
        padding-left: 1.5rem;
      }

      .name-title {
        font-size: clamp(1.3rem, 5vw, 1.65rem);
      }

      .focus-areas {
        font-size: 0.75rem;
      }

      .map-overlay .map-title {
        left: 1.5rem;
      }
    }

    @media (min-width: 1024px) {
      .focus-areas {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="globe-canvas"></canvas>

  <!-- Page 1: Globe -->
  <section class="page-section" id="page-1">
    <div class="content-overlay" id="content-overlay">
      <div class="intro-section">
        <h1>
          <span class="role-label">AI Application Engineer</span>
          <span class="name-title">Nie Wenjie (Cozy)</span>
        </h1>
        <ul class="focus-areas">
          <li><span class="keyword">RAG</span></li>
          <li><span class="slash">/</span><span class="keyword">Skills</span></li>
          <li><span class="slash">/</span><span class="keyword">Workflow</span></li>
          <li><span class="slash">/</span><span class="keyword">Agent</span></li>
          <li><span class="slash">/</span><span class="keyword">Application</span></li>
        </ul>
      </div>
    </div>

    <div class="drag-hint" id="drag-hint">
      <div class="drag-hint-icon">
        <svg viewBox="0 0 24 24"><polyline points="14 6 8 12 14 18"></polyline></svg>
        <svg viewBox="0 0 24 24"><polyline points="10 6 16 12 10 18"></polyline></svg>
        <div class="drag-hint-hand">
          <svg viewBox="0 0 24 24">
            <path d="M9 11V6.5a1.5 1.5 0 0 1 3 0V11"></path>
            <path d="M12 11V5.5a1.5 1.5 0 0 1 3 0V11"></path>
            <path d="M15 11V7a1.5 1.5 0 0 1 3 0v7a6 6 0 0 1-6 6h-1a6 6 0 0 1-5.2-3l-2.3-4a1.5 1.5 0 0 1 2.6-1.5L8 13V7.5a1.5 1.5 0 0 1 3 0V11"></path>
          </svg>
        </div>
      </div>
      <span>Drag to rotate</span>
    </div>
  </section>

  <!-- Page 2: China Map -->
  <section class="page-section" id="page-2">
    <div class="map-overlay" id="map-overlay">
      <div class="map-title">
        <span class="eyebrow">Hometown · Anhui</span>
        <span class="main">Fuyang, Anhui</span>
        <span class="sub">阜 阳 · 安 徽</span>
      </div>
      <div class="map-meta">
        <span>32.89° N&nbsp;&nbsp;·&nbsp;&nbsp;115.81° E</span>
        <span class="coord">FUYANG / CHINA</span>
      </div>
    </div>
  </section>

  <nav class="page-nav" aria-label="Page navigation">
    <button class="page-nav-button" id="page-up-button" type="button" aria-label="Previous page" disabled>
      <svg viewBox="0 0 24 24"><polyline points="6 14 12 8 18 14"></polyline></svg>
    </button>
    <span class="page-nav-label" id="page-nav-label">Page 1</span>
    <button class="page-nav-button" id="page-down-button" type="button" aria-label="Next page">
      <svg viewBox="0 0 24 24"><polyline points="6 10 12 16 18 10"></polyline></svg>
    </button>
  </nav>

  <script>
    (() => {
      const canvas = document.getElementById('globe-canvas');
      const ctx = canvas.getContext('2d');
      const dragHintEl = document.getElementById('drag-hint');
      const contentOverlay = document.getElementById('content-overlay');
      const mapOverlay = document.getElementById('map-overlay');
      const pageUpButton = document.getElementById('page-up-button');
      const pageDownButton = document.getElementById('page-down-button');
      const pageNavLabel = document.getElementById('page-nav-label');

      let width, height;

      // ===== Globe state =====
      const INITIAL_ROTATION = (105 * Math.PI) / 180; // Center on China (~105°E)
      let rotation = INITIAL_ROTATION;
      let tilt = 0.35;
      const ROTATION_SPEED = 0;

      // Idle gentle swing
      let hasInteracted = false;
      const SWING_AMPLITUDE = 0.18;
      const SWING_PERIOD = 7000;
      const swingStart = performance.now();

      // Interaction state
      let isDragging = false;
      let lastPointerX = 0;
      let lastPointerY = 0;
      let velocityRot = 0;
      const INERTIA_DAMPING = 0.94;
      const DRAG_SENSITIVITY = 0.005;

      // Globe parameters
      const GLOBE_RADIUS_RATIO = 0.30;
      const PERSPECTIVE = 800;

      // Grid lines config
      const LAT_LINES = 12;
      const LON_LINES = 24;
      const LINE_SEGMENTS = 80;

      // GeoJSON data
      let countryOutlines = [];
      let chinaOutlines = [];
      let provinceOutlines = [];
      let anhuiOutlines = [];
      let highlightedCityProvinceOutlines = [];

      // ===== Page transition state =====
      // progress: 0 = full globe (page 1), 1 = flat China map (page 2)
      let progress = 0;
      let targetProgress = 0;
      let lastFrameTime = performance.now();
      const PROGRESS_DAMPING = 3.8;
      let transitionDirection = 0;

      // Easing for animation curve
      const easeInOutCubic = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      const smootherStep = (t) => t * t * t * (t * (t * 6 - 15) + 10);
      const lerp = (a, b, t) => a + (b - a) * t;
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const smoothRange = (start, end, value) => smootherStep(clamp((value - start) / (end - start), 0, 1));
      const transitionEase = () => {
        const staged = clamp((progress - 0.03) / 0.94, 0, 1);
        return smootherStep(staged);
      };

      // China geographic bounds (approx) for flat-projection target
      const CHINA_BOUNDS = {
        minLon:  73.5,
        maxLon: 135.0,
        minLat:  18.0,
        maxLat:  53.6
      };
      const CHINA_CENTER_LAT = (CHINA_BOUNDS.minLat + CHINA_BOUNDS.maxLat) / 2;
      const CHINA_CENTER_LON = (CHINA_BOUNDS.minLon + CHINA_BOUNDS.maxLon) / 2;

      // Highlight cities on globe (page 1)
      const highlightCities = [
        { name: '北京通州', enName: 'Tongzhou, Beijing',  lat: 39.90, lon: 116.66, dir: { dx:  200, dy: -150 } },
        { name: '安徽阜阳', enName: 'Fuyang, Anhui',      lat: 32.89, lon: 115.81, dir: { dx: -235, dy:  -50 } },
        { name: '安徽合肥', enName: 'Hefei, Anhui',       lat: 31.82, lon: 117.25, dir: { dx: -255, dy:   70 } },
        { name: '浙江杭州', enName: 'Hangzhou, Zhejiang', lat: 30.27, lon: 120.15, dir: { dx:  255, dy:  100 } },
        { name: '上海杨浦', enName: 'Shanghai Yangpu',    lat: 31.27, lon: 121.52, dir: { dx:  285,  dy:  -15 } }
      ];
      const HIGHLIGHT_PROVINCE_ADCODES = new Set(['110000', '310000', '330000', '340000']);

      // Focus city on flat map (page 2)
      const focusCity = { name: '阜阳', enName: 'Fuyang, Anhui', region: '安徽 · 中国', lat: 32.89, lon: 115.81 };

      // Starfield
      const stars = [];
      const STAR_COUNT = 600;
      function initStars() {
        for (let i = 0; i < STAR_COUNT; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = (Math.random() * 0.00006 + 0.00002);
          stars.push({
            x: Math.random(),
            y: Math.random(),
            size: Math.random() * 1.5 + 0.3,
            alpha: Math.random() * 0.6 + 0.15,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinkleOffset: Math.random() * Math.PI * 2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            driftAmp: Math.random() * 0.0008 + 0.0002,
            driftFreq: Math.random() * 0.4 + 0.2,
            driftPhase: Math.random() * Math.PI * 2
          });
        }
      }
      initStars();

      let lastStarTime = performance.now();
      function drawStars(alpha) {
        const now = performance.now();
        const dt = Math.min(64, now - lastStarTime);
        lastStarTime = now;
        const time = now * 0.001;

        for (const s of stars) {
          s.x += s.vx * dt + Math.cos(time * s.driftFreq + s.driftPhase) * s.driftAmp * dt * 0.06;
          s.y += s.vy * dt + Math.sin(time * s.driftFreq + s.driftPhase) * s.driftAmp * dt * 0.06;

          if (s.x < -0.01) s.x = 1.01;
          else if (s.x > 1.01) s.x = -0.01;
          if (s.y < -0.01) s.y = 1.01;
          else if (s.y > 1.01) s.y = -0.01;

          const flicker = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed * 60 + s.twinkleOffset);
          const a = s.alpha * (0.5 + 0.5 * flicker) * alpha;
          if (a < 0.01) continue;
          ctx.beginPath();
          ctx.arc(s.x * width, s.y * height, s.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(220, 230, 255, ${a})`;
          ctx.fill();
        }
      }

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      // ===== Pointer / Touch interaction (only on page 1) =====
      function getEventPoint(e) {
        if (e.touches && e.touches.length > 0) {
          return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        return { x: e.clientX, y: e.clientY };
      }

      function onPointerDown(e) {
        if (progress > 0.05) return; // disable drag on map page
        isDragging = true;
        const p = getEventPoint(e);
        lastPointerX = p.x;
        lastPointerY = p.y;
        velocityRot = 0;
        if (!hasInteracted) {
          hasInteracted = true;
          if (dragHintEl) dragHintEl.classList.add('hidden');
        }
        if (e.cancelable) e.preventDefault();
      }

      function onPointerMove(e) {
        if (!isDragging) return;
        const p = getEventPoint(e);
        const dx = p.x - lastPointerX;
        lastPointerX = p.x;
        lastPointerY = p.y;
        const dRot = -dx * DRAG_SENSITIVITY;
        rotation += dRot;
        velocityRot = dRot;
        if (e.cancelable) e.preventDefault();
      }

      function onPointerUp() { isDragging = false; }

      canvas.addEventListener('mousedown', onPointerDown);
      window.addEventListener('mousemove', onPointerMove);
      window.addEventListener('mouseup', onPointerUp);
      canvas.addEventListener('touchstart', onPointerDown, { passive: false });
      window.addEventListener('touchmove', onPointerMove, { passive: false });
      window.addEventListener('touchend', onPointerUp);
      window.addEventListener('touchcancel', onPointerUp);

      // ===== Page controls: drives page 1 -> page 2 transition =====
      let currentPage = 0;
      let visualPage = 0;

      function updatePageUI() {
        const showingMap = visualPage === 1;
        if (showingMap) {
          contentOverlay.style.opacity = '0';
          contentOverlay.style.transform = 'translateY(-18px)';
          if (dragHintEl) dragHintEl.style.opacity = '0';
          mapOverlay.classList.add('visible');
        } else {
          contentOverlay.style.opacity = '';
          contentOverlay.style.transform = '';
          if (dragHintEl && !hasInteracted) dragHintEl.style.opacity = '';
          mapOverlay.classList.remove('visible');
        }

        if (pageUpButton) pageUpButton.disabled = currentPage === 0;
        if (pageDownButton) pageDownButton.disabled = currentPage === 1;
        if (pageNavLabel) pageNavLabel.textContent = currentPage === 1 ? 'Page 2' : 'Page 1';
      }

      function goToPage(page) {
        const nextPage = clamp(page, 0, 1);
        if (nextPage === currentPage) return;
        transitionDirection = nextPage > currentPage ? 1 : -1;
        currentPage = nextPage;
        targetProgress = currentPage;
        if (transitionDirection > 0) visualPage = 1;
        updatePageUI();
      }

      if (pageUpButton) pageUpButton.addEventListener('click', () => goToPage(0));
      if (pageDownButton) pageDownButton.addEventListener('click', () => goToPage(1));
      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
          e.preventDefault();
          goToPage(1);
        } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
          e.preventDefault();
          goToPage(0);
        }
      });
      updatePageUI();

      // ===== 3D math helpers =====
      function rotateY(x, y, z, angle) {
        const cos = Math.cos(angle), sin = Math.sin(angle);
        return { x: x * cos - z * sin, y, z: x * sin + z * cos };
      }
      function rotateX(x, y, z, angle) {
        const cos = Math.cos(angle), sin = Math.sin(angle);
        return { x, y: y * cos - z * sin, z: y * sin + z * cos };
      }
      function project(x, y, z, cx, cy, radius) {
        const scale = PERSPECTIVE / (PERSPECTIVE + z);
        return { x: cx + x * scale * radius, y: cy - y * scale * radius, z, scale };
      }
      function latLonToXYZ(lat, lon) {
        const latR = (lat * Math.PI) / 180;
        const lonR = (lon * Math.PI) / 180;
        return {
          x: Math.cos(latR) * Math.sin(lonR),
          y: Math.sin(latR),
          z: Math.cos(latR) * Math.cos(lonR)
        };
      }

      // ===== Core projection: blends sphere -> flat-china map =====
      // Returns { x, y, visible, frontness }
      // - frontness: 1 = fully on front of globe, 0 = back
      // - On flat map (progress=1) frontness is forced to 1
      function projectPoint(lat, lon, cx, cy, radius, mapScale, mapCx, mapCy) {
        const t = progress;
        // Sphere position (rotated by user)
        const sph = latLonToXYZ(lat, lon);
        let r = rotateY(sph.x, sph.y, sph.z, rotation);
        r = rotateX(r.x, r.y, r.z, tilt);
        const sp = project(r.x, r.y, r.z, cx, cy, radius);
        const sphereFrontness = clamp((r.z + 0.1) / 0.4, 0, 1);

        if (t <= 0.0001) {
          return { x: sp.x, y: sp.y, frontness: sphereFrontness, sphereFrontness, mode: 'sphere' };
        }

        // Flat (equirectangular) target position centered on China
        const fx = mapCx + (lon - CHINA_CENTER_LON) * mapScale;
        const fy = mapCy - (lat - CHINA_CENTER_LAT) * mapScale;

        // Blend sphere -> flat
        const e = transitionEase();
        const x = lerp(sp.x, fx, e);
        const y = lerp(sp.y, fy, e);
        // Frontness fades to 1 as we flatten
        const frontness = lerp(sphereFrontness, 1, e);
        return { x, y, frontness, sphereFrontness, mode: t >= 0.9999 ? 'flat' : 'blend' };
      }

      // Generate latitude line points
      function getLatLine(latIndex, totalLines) {
        const lat = -90 + (180 / (totalLines + 1)) * (latIndex + 1);
        const points = [];
        for (let i = 0; i <= LINE_SEGMENTS; i++) {
          const lon = -180 + (360 * i) / LINE_SEGMENTS;
          points.push({ lat, lon });
        }
        return points;
      }
      function getLonLine(lonIndex, totalLines) {
        const lon = -180 + (360 * lonIndex) / totalLines;
        const points = [];
        for (let i = 0; i <= LINE_SEGMENTS; i++) {
          const lat = -90 + (180 * i) / LINE_SEGMENTS;
          points.push({ lat, lon });
        }
        return points;
      }

      // Pre-process GeoJSON: store lat/lon directly so the projection can blend dynamically
      function processGeoJSON(data) {
        const outlines = [];
        const china = [];
        for (const feature of data.features) {
          const geom = feature.geometry;
          if (!geom) continue;
          const isChina = String(feature.id) === '156';
          const processRing = (ring) => {
            const pts = [];
            for (const coord of ring) {
              pts.push({ lon: coord[0], lat: coord[1] });
            }
            if (isChina) china.push(pts); else outlines.push(pts);
          };
          if (geom.type === 'Polygon') {
            for (const ring of geom.coordinates) processRing(ring);
          } else if (geom.type === 'MultiPolygon') {
            for (const polygon of geom.coordinates) for (const ring of polygon) processRing(ring);
          }
        }
        return { outlines, china };
      }

      function processProvinceGeoJSON(data) {
        const provinces = [];
        const anhui = [];
        const highlighted = [];
        for (const feature of data.features || []) {
          const geom = feature.geometry;
          if (!geom) continue;
          const props = feature.properties || {};
          const name = String(props.name || props.fullname || '');
          const adcode = String(props.adcode || props.id || '');
          const isAnhui = name.includes('安徽') || adcode === '340000';
          const isHighlightedProvince = HIGHLIGHT_PROVINCE_ADCODES.has(adcode) ||
            name.includes('北京') || name.includes('上海') || name.includes('浙江') || name.includes('安徽');

          const processRing = (ring) => {
            const pts = [];
            for (const coord of ring) pts.push({ lon: coord[0], lat: coord[1] });
            if (pts.length > 1) {
              provinces.push(pts);
              if (isAnhui) anhui.push(pts);
              if (isHighlightedProvince) highlighted.push(pts);
            }
          };

          if (geom.type === 'Polygon') {
            for (const ring of geom.coordinates) processRing(ring);
          } else if (geom.type === 'MultiPolygon') {
            for (const polygon of geom.coordinates) for (const ring of polygon) processRing(ring);
          }
        }
        return { provinces, anhui, highlighted };
      }

      async function loadGeoData() {
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = '/assets/topojson-client.min.js';
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
        try {
          const resp = await fetch('/assets/countries-50m.json');
          const topo = await resp.json();
          const geojson = topojson.feature(topo, topo.objects.countries);
          const result = processGeoJSON(geojson);
          countryOutlines = result.outlines;
          chinaOutlines = result.china;
        } catch (e) {
          console.warn('50m failed, falling back to 110m...', e);
          try {
            const resp = await fetch('/assets/countries-110m.json');
            const topo = await resp.json();
            const geojson = topojson.feature(topo, topo.objects.countries);
            const result = processGeoJSON(geojson);
            countryOutlines = result.outlines;
            chinaOutlines = result.china;
          } catch (e2) {
            console.error('Failed to load map data', e2);
          }
        }

        try {
          const resp = await fetch('/assets/china-provinces-full.json');
          const geojson = await resp.json();
          const result = processProvinceGeoJSON(geojson);
          provinceOutlines = result.provinces;
          anhuiOutlines = result.anhui;
          highlightedCityProvinceOutlines = result.highlighted;
        } catch (e) {
          console.warn('Failed to load China province boundaries', e);
        }
      }

      // ===== Drawing helpers =====

      // Draw a 3D/blended polyline; auto-handles front/back depth on sphere
      // opts: { color, lineWidth, frontAlpha, backAlpha, strictSphereDepth }
      function drawBlendedLine(points, ctxRef, opts) {
        const t = progress;
        const { cx, cy, radius, mapScale, mapCx, mapCy } = ctxRef;
        const { color, lineWidth = 1, frontAlpha = 1, backAlpha = 0.06, drawBack = true, strictSphereDepth = false } = opts;

        // When mostly flat, treat everything as "front"
        const flatMode = !strictSphereDepth && t > 0.35;

        let frontSegs = [], backSegs = [];
        let curFront = [], curBack = [];

        for (let i = 0; i < points.length; i++) {
          const pp = points[i];
          const proj = projectPoint(pp.lat, pp.lon, cx, cy, radius, mapScale, mapCx, mapCy);
          const depth = strictSphereDepth ? proj.sphereFrontness : proj.frontness;
          const isFront = flatMode ? true : (depth > 0);
          const pt = { x: proj.x, y: proj.y };
          if (isFront) {
            curFront.push(pt);
            if (curBack.length > 0) { backSegs.push(curBack); curBack = []; }
          } else {
            curBack.push(pt);
            if (curFront.length > 0) { frontSegs.push(curFront); curFront = []; }
          }
        }
        if (curFront.length > 0) frontSegs.push(curFront);
        if (curBack.length > 0) backSegs.push(curBack);

        // Back lines (only when sphere is visible)
        if (drawBack && t < 0.6) {
          const ba = backAlpha * (1- t);
          if (ba > 0.005) {
            ctx.strokeStyle = color.replace('ALPHA', ba.toFixed(3));
            ctx.lineWidth = Math.max(0.3, lineWidth * 0.5);
            backSegs.forEach(seg => {
              if (seg.length < 2) return;
              ctx.beginPath();
              ctx.moveTo(seg[0].x, seg[0].y);
              for (let i = 1; i < seg.length; i++) ctx.lineTo(seg[i].x, seg[i].y);
              ctx.stroke();
            });
          }
        }

        // Front lines
        const fa = frontAlpha;
        if (fa > 0.005) {
          ctx.strokeStyle = color.replace('ALPHA', fa.toFixed(3));
          ctx.lineWidth = lineWidth;
          frontSegs.forEach(seg => {
            if (seg.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(seg[0].x, seg[0].y);
            for (let i = 1; i < seg.length; i++) ctx.lineTo(seg[i].x, seg[i].y);
            ctx.stroke();
          });
        }
      }

      // Draw China outline with bright glow; emphasized as we approach the flat map
      function drawChina(ctxRef) {
        const t = progress;
        const e = transitionEase();
        // Outer glow stronger when flat
        const glowAlpha = lerp(0.25, 0.55, e);
        const glowWidth = lerp(3.5, 6.0, e);
        const innerAlpha = lerp(0.85, 0.98, e);
        const innerWidth = lerp(1.5, 2.0, e);

        for (const outline of chinaOutlines) {
          drawBlendedLine(outline, ctxRef, {
            color: 'rgba(80, 180, 255, ALPHA)',
            lineWidth: glowWidth,
            frontAlpha: glowAlpha,
            drawBack: false
          });
          drawBlendedLine(outline, ctxRef, {
            color: 'rgba(140, 220, 255, ALPHA)',
            lineWidth: innerWidth,
            frontAlpha: innerAlpha,
            backAlpha: 0.12
          });
        }
      }

      function drawProvinceOutlines(ctxRef) {
        if (progress < 0.24 || provinceOutlines.length === 0) return;
        const appear = smoothRange(0.24, 0.76, progress);
        const baseAlpha = 0.22 * appear;

        for (const outline of provinceOutlines) {
          drawBlendedLine(outline, ctxRef, {
            color: 'rgba(166, 218, 255, ALPHA)',
            lineWidth: 0.75,
            frontAlpha: baseAlpha,
            backAlpha: 0,
            drawBack: false
          });
        }
      }

      function drawGlobeProvinceOutlines(ctxRef) {
        if (progress > 0.72 || provinceOutlines.length === 0) return;
        const fade = 1 - smoothRange(0.32, 0.72, progress);
        const flattenBoost = smoothRange(0.18, 0.46, progress);
        const provinceAlpha = 0.2 * fade;
        const highlightAlpha = lerp(0.72, 0.3, flattenBoost) * fade;
        const time = performance.now() * 0.001;
        const pulse = 0.78 + 0.22 * Math.sin(time * 2.1);

        if (provinceAlpha > 0.01) {
          for (const outline of provinceOutlines) {
            drawBlendedLine(outline, ctxRef, {
              color: 'rgba(150, 215, 255, ALPHA)',
              lineWidth: 0.65,
              frontAlpha: provinceAlpha,
              backAlpha: 0.025 * fade
            });
          }
        }

        if (highlightAlpha > 0.01) {
          for (const outline of highlightedCityProvinceOutlines) {
            drawBlendedLine(outline, ctxRef, {
              color: 'rgba(255, 194, 92, ALPHA)',
              lineWidth: 3.2,
              frontAlpha: 0.18 * fade * pulse,
              backAlpha: 0,
              drawBack: false
            });
            drawBlendedLine(outline, ctxRef, {
              color: 'rgba(255, 232, 154, ALPHA)',
              lineWidth: 1.15,
              frontAlpha: highlightAlpha,
              backAlpha: 0,
              drawBack: false
            });
          }
        }
      }

      function drawAnhuiHighlight(ctxRef) {
        if (progress < 0.36 || anhuiOutlines.length === 0) return;
        const appear = smoothRange(0.36, 0.82, progress);
        const time = performance.now() * 0.001;
        const pulse = 0.72 + 0.28 * Math.sin(time * 2.2);

        for (const outline of anhuiOutlines) {
          drawBlendedLine(outline, ctxRef, {
            color: 'rgba(255, 190, 96, ALPHA)',
            lineWidth: 7.5,
            frontAlpha: 0.18 * appear * pulse,
            backAlpha: 0,
            drawBack: false
          });
          drawBlendedLine(outline, ctxRef, {
            color: 'rgba(255, 222, 146, ALPHA)',
            lineWidth: 2.1,
            frontAlpha: 0.92 * appear,
            backAlpha: 0,
            drawBack: false
          });
          drawBlendedLine(outline, ctxRef, {
            color: 'rgba(255, 250, 226, ALPHA)',
            lineWidth: 0.75,
            frontAlpha: 0.86 * appear,
            backAlpha: 0,
            drawBack: false
          });
        }
      }

      // Draw page-1 highlight cities. Fade out as progress increases.
      function drawCityPoints(ctxRef) {
        const t = progress;
        if (t > 0.4) return; // hidden once transitioning to map
        const fade = 1 - clamp(t / 0.4, 0, 1);
        const { cx, cy, radius, mapScale, mapCx, mapCy } = ctxRef;
        const time = performance.now() * 0.001;

        for (const city of highlightCities) {
          const proj = projectPoint(city.lat, city.lon, cx, cy, radius, mapScale, mapCx, mapCy);
          if (proj.frontness <= 0) continue;
          const p = { x: proj.x, y: proj.y };
          const vis = proj.frontness * fade;
          const pulse = 0.6 + 0.4 * Math.sin(time * 2.5 + city.lat);

          if (vis > 0.05) {
            const dx = city.dir.dx;
            const dy = city.dir.dy;
            const len = Math.hypot(dx, dy) || 1;
            const startGap = 6;
            const sx = p.x + (dx / len) * startGap;
            const sy = p.y + (dy / len) * startGap;
            const tailLen = dx >= 0 ? 95 : -95;
            const bx = p.x + dx;
            const by = p.y + dy;
            const ex = bx + tailLen;
            const ey = by;

            ctx.strokeStyle = `rgba(255, 210, 140, ${(0.7 * vis).toFixed(3)})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(bx, by);
            ctx.lineTo(ex, ey);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(bx, by, 1.6, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 230, 180, ${(0.9 * vis).toFixed(3)})`;
            ctx.fill();

            const labelPadX = 8;
            const labelY = ey - 8;
            const align = dx >= 0 ? 'left' : 'right';
            const tx = dx >= 0 ? ex - tailLen + labelPadX : ex - tailLen - labelPadX;
            ctx.font = '600 16px "Shippori Mincho ATF", serif';
            ctx.textAlign = align;
            ctx.textBaseline = 'alphabetic';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.85)';
            ctx.shadowBlur = 8;
            ctx.fillStyle = `rgba(255, 240, 210, ${(0.95 * vis).toFixed(3)})`;
            ctx.fillText(city.enName, tx, labelY);
            ctx.shadowBlur = 0;
          }

          const glowRadius = 8 * pulse;
          const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowRadius);
          gradient.addColorStop(0, `rgba(255, 200, 80, ${(0.9 * fade).toFixed(3)})`);
          gradient.addColorStop(0.3, `rgba(255, 160, 50, ${(0.5 * fade).toFixed(3)})`);
          gradient.addColorStop(0.7, `rgba(255, 120, 30, ${(0.15 * fade).toFixed(3)})`);
          gradient.addColorStop(1, 'rgba(255, 100, 20, 0)');
          ctx.beginPath();
          ctx.arc(p.x, p.y, glowRadius, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();

          ctx.beginPath();
          ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 240, 200, ${(0.95 * fade).toFixed(3)})`;
          ctx.fill();

          const ringRadius = 5 + 4 * pulse;
          ctx.beginPath();
          ctx.arc(p.x, p.y, ringRadius, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 180, 60, ${(0.4 * pulse * fade).toFixed(3)})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }

      // Draw the focus city (Fuyang) on the map page. Fades in with progress.
      function drawFocusCity(ctxRef) {
        const t = progress;
        if (t < 0.36) return;
        const appear = smoothRange(0.36, 0.82, t);
        const { cx, cy, radius, mapScale, mapCx, mapCy } = ctxRef;
        const proj = projectPoint(focusCity.lat, focusCity.lon, cx, cy, radius, mapScale, mapCx, mapCy);
        const p = { x: proj.x, y: proj.y };
        const time = performance.now() * 0.001;
        const pulse = 0.6 + 0.4 * Math.sin(time * 2.0);

        // Expanding ripple rings
        for (let i = 0; i < 3; i++) {
          const phase = (time * 0.6 + i / 3) % 1;
          const ringR = lerp(6, 60, phase);
          const ringA = (1 - phase) * 0.5 * appear;
          if (ringA <= 0.01) continue;
          ctx.beginPath();
          ctx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 200, 120, ${ringA.toFixed(3)})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }

        // Big glow
        const glowR = 32 * (0.85 + 0.15 * pulse) * appear;
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
        grad.addColorStop(0, `rgba(255, 220, 130, ${(0.9 * appear).toFixed(3)})`);
        grad.addColorStop(0.25, `rgba(255, 180, 80, ${(0.5 * appear).toFixed(3)})`);
        grad.addColorStop(0.6, `rgba(255, 140, 50, ${(0.15 * appear).toFixed(3)})`);
        grad.addColorStop(1, 'rgba(255, 100, 30, 0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Core dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 245, 220, ${appear.toFixed(3)})`;
        ctx.fill();

        // Leader + label only when mostly flat
        if (appear > 0.4) {
          const labelAppear = clamp((appear - 0.4) / 0.6, 0, 1);
          const dx = 70, dy = -85;
          const ex = p.x + dx;
          const ey = p.y + dy;
          const tailLen = 110;
          const tx2 = ex + tailLen;

          ctx.strokeStyle = `rgba(255, 210, 140, ${(0.85 * labelAppear).toFixed(3)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(p.x + 6, p.y - 6);
          ctx.lineTo(ex, ey);
          ctx.lineTo(tx2, ey);
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(ex, ey, 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 230, 180, ${labelAppear.toFixed(3)})`;
          ctx.fill();

          ctx.shadowColor = 'rgba(0, 0, 0, 0.85)';
          ctx.shadowBlur = 10;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
          ctx.font = '700 22px "Shippori Mincho ATF", serif';
          ctx.fillStyle = `rgba(255, 245, 215, ${labelAppear.toFixed(3)})`;
          ctx.fillText(focusCity.enName, ex + 10, ey - 8);

          ctx.font = '500 12px "Shippori Mincho ATF", serif';
          ctx.fillStyle = `rgba(255, 220, 170, ${(0.8 * labelAppear).toFixed(3)})`;
          ctx.fillText(focusCity.region, ex + 10, ey + 12);

          ctx.shadowBlur = 0;
        }
      }

      // Optional sphere glow + outline (only when sphere is visible)
      function drawGlobeChrome(cx, cy, radius) {
        const t = progress;
        if (t > 0.7) return;
        const alpha = 1 - clamp(t / 0.7, 0, 1);
        // Soft outer glow
        const gradient = ctx.createRadialGradient(cx, cy, radius * 0.8, cx, cy, radius * 1.5);
        gradient.addColorStop(0, `rgba(100, 140, 200, ${(0.04 * alpha).toFixed(3)})`);
        gradient.addColorStop(1, 'rgba(100, 140, 200, 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        // Rim
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(200, 210, 220, ${(0.15 * alpha).toFixed(3)})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // ===== Main draw loop =====
      function computeViewParams() {
        const minDim = Math.min(width, height);
        const radius = minDim * GLOBE_RADIUS_RATIO;
        // Sphere center (page 1)
        const sphereCx = width * 0.58;
        const sphereCy = height * 0.5;
        // Flat-map center (page 2): centered horizontally, with a slight upward shift for the label
        const flatCx = width * 0.5;
        const flatCy = height * 0.52;

        // Camera follows the blend
        const e = transitionEase();
        const cx = lerp(sphereCx, flatCx, e);
        const cy = lerp(sphereCy, flatCy, e);

        // Flat-map scale: fit China bounds to ~75% of the smaller dimension
        const lonSpan = CHINA_BOUNDS.maxLon - CHINA_BOUNDS.minLon;
        const latSpan = CHINA_BOUNDS.maxLat - CHINA_BOUNDS.minLat;
        const fitW = (minDim * 0.78) / lonSpan;
        const fitH = (height * 0.68) / latSpan;
        const mapScale = Math.min(fitW, fitH);

        return { cx, cy, radius, mapScale, mapCx: flatCx, mapCy: flatCy };
      }

      function draw() {
        const now = performance.now();
        const dt = Math.min(48, now - lastFrameTime) / 1000;
        lastFrameTime = now;

        // Frame-rate independent damping toward the scroll-driven target.
        const progressBlend = 1 - Math.exp(-PROGRESS_DAMPING * dt);
        progress += (targetProgress - progress) * progressBlend;
        if (Math.abs(progress - targetProgress) < 0.0003) progress = targetProgress;

        if (transitionDirection < 0 && progress < 0.18 && visualPage !== 0) {
          visualPage = 0;
          updatePageUI();
        } else if (transitionDirection > 0 && progress > 0.56 && visualPage !== 1) {
          visualPage = 1;
          updatePageUI();
        }
        if (progress === targetProgress) transitionDirection = 0;

        ctx.clearRect(0, 0, width, height);

        // Stars: fade out a bit on the map page for clarity
        const starAlpha = 1 - 0.42 * smoothRange(0.12, 0.92, progress);
        drawStars(starAlpha);

        const view = computeViewParams();

        drawGlobeChrome(view.cx, view.cy, view.radius);

        // Grid lines: visible on sphere, fade out completely on flat map
        const gridAlpha = 1 - smoothRange(0.16, 0.7, progress);
        if (gridAlpha > 0.01) {
          const baseAlpha = 0.18 * gridAlpha;
          for (let i = 0; i < LAT_LINES; i++) {
            drawBlendedLine(getLatLine(i, LAT_LINES), view, {
              color: 'rgba(180, 195, 220, ALPHA)',
              lineWidth: 0.5,
              frontAlpha: baseAlpha,
              backAlpha: 0.04 * gridAlpha
            });
          }
          for (let i = 0; i < LON_LINES; i++) {
            drawBlendedLine(getLonLine(i, LON_LINES), view, {
              color: 'rgba(180, 195, 220, ALPHA)',
              lineWidth: 0.5,
              frontAlpha: baseAlpha,
              backAlpha: 0.04 * gridAlpha
            });
          }
        }

        // Other countries: fade out as we approach the flat map
        const otherAlpha = (1 - smoothRange(0.18, 0.74, progress)) * 0.5;
        if (otherAlpha > 0.01) {
          for (const outline of countryOutlines) {
            drawBlendedLine(outline, view, {
              color: 'rgba(160, 195, 240, ALPHA)',
              lineWidth: 1.0,
              frontAlpha: otherAlpha,
              backAlpha: 0,
              drawBack: false,
              strictSphereDepth: true
            });
          }
        }

        // China — always present, emphasized as we flatten
        drawChina(view);
        drawGlobeProvinceOutlines(view);
        drawProvinceOutlines(view);
        drawAnhuiHighlight(view);

        // City highlights (sphere) + focus city (flat)
        drawCityPoints(view);
        drawFocusCity(view);

        // Globe rotation behavior
        const TWO_PI = Math.PI * 2;
        const flatten = transitionEase();
        const swingRestore = 1 - smoothRange(0.02, 0.36, progress);
        const tt = (performance.now() - swingStart) / SWING_PERIOD;
        const idleRotation = INITIAL_ROTATION + Math.sin(tt * Math.PI * 2) * SWING_AMPLITUDE;
        const targetRotation = !hasInteracted ? lerp(INITIAL_ROTATION, idleRotation, swingRestore) : INITIAL_ROTATION;
        let diff = ((targetRotation - rotation) % TWO_PI + TWO_PI + Math.PI) % TWO_PI - Math.PI;

        if (!isDragging) {
          if (progress < 0.08 && Math.abs(velocityRot) > 1e-5) {
            rotation += velocityRot;
            velocityRot *= INERTIA_DAMPING;
          } else {
            velocityRot = 0;
            const easeFactor = lerp(0.018, 0.075, flatten);
            rotation += diff * easeFactor;
          }
        }
        tilt += (lerp(0.35, 0.05, flatten) - tilt) * lerp(0.025, 0.085, flatten);

        requestAnimationFrame(draw);
      }

      // Start: load data then animate
      loadGeoData().then(() => {
        draw();
      });
    })();
  </script>
</body>
</html>
