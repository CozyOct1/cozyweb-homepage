<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/android/mipmap-xxxhdpi/ic_launcher.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/android/mipmap-mdpi/ic_launcher.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/android/mipmap-xxxhdpi/ic_launcher.png">
  <style>
    @font-face {
      font-family: 'FreePixel';
      src: url('/assets/FreePixel.ttf') format('truetype');
      font-weight: 100 900;
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --line-color: rgba(200, 210, 220, 0.35);
      --line-color-bright: rgba(200, 210, 220, 0.6);
      --text-primary: #e0e6ed;
      --text-secondary: rgba(180, 190, 200, 0.7);
      --accent: #7eb8da;
      --bg-dark: #060b18;
    }

    html, body {
      height: 100%;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, rgba(25, 35, 80, 0.4) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(15, 25, 60, 0.3) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, #0d1229 0%, #060b18 100%);
      color: var(--text-primary);
      font-family: 'FreePixel', monospace;
      width: 100vw;
      overflow: hidden;
    }

    /* Fixed canvas that spans the full viewport across all sections */
    #globe-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      cursor: grab;
      touch-action: pan-y;
    }

    #globe-canvas:active {
      cursor: grabbing;
    }

    .page-section {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
    }

    /* ============ Page 1 ============ */
    .content-overlay {
      position: absolute;
      top: clamp(5.5rem, 15vh, 9rem);
      left: 0;
      z-index: 10;
      text-align: left;
      font-family: 'FreePixel', monospace;
      pointer-events: none;
      padding-left: clamp(2rem, 5vw, 4.5rem);
      transition: opacity 0.7s ease, transform 0.8s ease;
    }

    .intro-section h1 {
      margin: 0;
    }

    .role-label {
      display: block;
      font-size: 1.00rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(239, 236, 228, 0.55);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
      opacity: 0;
      animation: fadeSlideIn 2.0s ease-out 3.0s forwards;
    }

    .name-title {
      display: block;
      margin-top: 1.25rem;
      font-size: clamp(1.8rem, 3.8vw, 3.4rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: #efece4;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.55);
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 0.8s forwards;
    }

    .focus-areas {
      display: flex;
      align-items: center;
      margin: 1.25rem 0 0 0;
      padding: 0;
      list-style: none;
      font-size: 1.00rem;
      letter-spacing: 0.1em;
      line-height: 1.9;
      color: rgba(239, 236, 228, 0.8);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 1.1s forwards;
    }

    .focus-areas li {
      display: flex;
      align-items: center;
    }

    .focus-areas li .slash {
      margin: 0 0.25rem;
      color: rgba(239, 236, 228, 0.55);
    }

    .focus-areas li .keyword {
      color: rgba(239, 236, 228, 0.8);
      white-space: nowrap;
    }

    .page-nav {
      position: absolute;
      right: clamp(1.5rem, 4vw, 3rem);
      bottom: clamp(1.5rem, 4vh, 3rem);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.8s forwards;
    }

    .page-nav-button {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(180, 210, 240, 0.28);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(8, 14, 32, 0.36);
      color: rgba(230, 240, 250, 0.82);
      cursor: pointer;
      pointer-events: auto;
      backdrop-filter: blur(10px);
      transition: opacity 0.25s ease, border-color 0.25s ease, background 0.25s ease, transform 0.25s ease;
    }

    .page-nav-button:hover:not(:disabled) {
      border-color: rgba(255, 220, 150, 0.58);
      background: rgba(255, 190, 90, 0.12);
      transform: translateY(-1px);
    }

    .page-nav-button:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .page-nav-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .page-nav-label {
      font-family: 'FreePixel', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Drag hint */
    .drag-hint {
      position: absolute;
      left: 58%;
      top: 50%;
      transform: translate(-50%, calc(50% + clamp(80px, 18vh, 160px)));
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      animation: dragHintAppear 1s ease-out 1.6s forwards;
    }

    .drag-hint.hidden {
      opacity: 0 !important;
      animation: none;
    }

    .drag-hint-icon {
      position: relative;
      width: 64px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(180, 210, 240, 0.75);
    }

    .drag-hint-icon svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drag-hint-hand {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      color: rgba(220, 235, 250, 0.95);
      animation: dragHandSwing 2.6s ease-in-out infinite;
    }

    .drag-hint-hand svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drag-hint span {
      font-family: 'FreePixel', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    @keyframes dragHintAppear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes dragHandSwing {
      0%   { transform: translate(-50%, -50%) translateX(-18px); opacity: 0.4; }
      15%  { opacity: 1; }
      50%  { transform: translate(-50%, -50%) translateX(18px); opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(-18px); opacity: 0.4; }
    }

    /* ============ Page 2 - China Map ============ */
    .map-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.8s ease 0.1s, transform 0.9s ease 0.1s;
    }

    .map-overlay.exiting {
      transition: opacity 0.24s ease, transform 0.3s ease;
    }

    .map-overlay.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .map-overlay .map-title {
      position: absolute;
      top: clamp(5.5rem, 15vh, 9rem);
      left: 0;
      padding-left: clamp(2rem, 5vw, 4.5rem);
      font-family: 'FreePixel', monospace;
    }

    .map-overlay .map-title .eyebrow {
      display: block;
      font-size: 1.00rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(239, 236, 228, 0.55);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
    }

    .map-overlay .map-title .main {
      display: block;
      margin-top: 1.25rem;
      font-size: clamp(1.8rem, 3.8vw, 3.4rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: #efece4;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.55);
    }

    .map-overlay .map-title .sub {
      display: block;
      margin: 1.25rem 0 0 0;
      font-size: 1.00rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      line-height: 1.9;
      color: rgba(239, 236, 228, 0.8);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .content-overlay {
        padding-left: 1.5rem;
      }

      .name-title {
        font-size: clamp(1.3rem, 5vw, 1.65rem);
      }

      .focus-areas {
        font-size: 0.75rem;
      }

      .map-overlay .map-title {
        left: 0;
        padding-left: 1.5rem;
      }

    }

    @media (min-width: 1024px) {
      .focus-areas {
        font-size: 0.95rem;
      }
    }



    /* ============ Loading Screen ============ */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: radial-gradient(ellipse at 30% 20%, rgba(25, 35, 80, 0.4) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(15, 25, 60, 0.3) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, #0d1229 0%, #060b18 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-orbit {
      position: relative;
      width: 90px;
      height: 90px;
    }

    .loader-orbit .orbit-ring {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(180, 210, 240, 0.12);
      border-radius: 50%;
      animation: orbitPulse 3s ease-in-out infinite;
    }

    .loader-orbit .orbit-ring:nth-child(2) {
      inset: -14px;
      border-color: rgba(180, 210, 240, 0.07);
      animation-delay: 0.4s;
      animation-duration: 3.4s;
    }

    .loader-orbit .orbit-ring:nth-child(3) {
      inset: -28px;
      border-color: rgba(180, 210, 240, 0.04);
      animation-delay: 0.8s;
      animation-duration: 3.8s;
    }

    @keyframes orbitPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }

    .loader-orbit .core-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 210, 120, 0.95) 0%, rgba(255, 170, 70, 0.5) 40%, rgba(126, 184, 218, 0.15) 70%, transparent 100%);
      box-shadow: 0 0 20px rgba(255, 190, 90, 0.35),
                  0 0 50px rgba(126, 184, 218, 0.12);
      animation: corePulse 2.2s ease-in-out infinite;
    }

    @keyframes corePulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .loader-orbit .satellite {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      margin: -2.5px 0 0 -2.5px;
      border-radius: 50%;
      background: rgba(200, 220, 255, 0.9);
      box-shadow: 0 0 6px rgba(200, 220, 255, 0.6);
    }

    .loader-orbit .satellite-1 {
      animation: orbit1 2.4s linear infinite;
    }

    .loader-orbit .satellite-2 {
      animation: orbit2 3.0s linear infinite;
      width: 3.5px;
      height: 3.5px;
      margin: -1.75px 0 0 -1.75px;
      background: rgba(255, 210, 140, 0.85);
      box-shadow: 0 0 5px rgba(255, 210, 140, 0.5);
    }

    .loader-orbit .satellite-3 {
      animation: orbit3 4.0s linear infinite;
      width: 2.5px;
      height: 2.5px;
      margin: -1.25px 0 0 -1.25px;
      background: rgba(126, 184, 218, 0.7);
      box-shadow: 0 0 4px rgba(126, 184, 218, 0.4);
    }

    @keyframes orbit1 {
      from { transform: rotate(0deg) translateX(38px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(38px) rotate(-360deg); }
    }

    @keyframes orbit2 {
      from { transform: rotate(120deg) translateX(54px) rotate(-120deg); }
      to   { transform: rotate(480deg) translateX(54px) rotate(-480deg); }
    }

    @keyframes orbit3 {
      from { transform: rotate(240deg) translateX(70px) rotate(-240deg); }
      to   { transform: rotate(600deg) translateX(70px) rotate(-600deg); }
    }

    .loader-text {
      margin-top: 2.5rem;
      font-family: 'FreePixel', monospace;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(200, 215, 235, 0.45);
      animation: textPulse 2.5s ease-in-out infinite;
    }

    @keyframes textPulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.8; }
    }

    .loader-bar-track {
      margin-top: 1.4rem;
      width: 120px;
      height: 1px;
      background: rgba(180, 210, 240, 0.1);
      border-radius: 1px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(126, 184, 218, 0.6), rgba(255, 210, 140, 0.7));
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    @media (max-width: 768px) {
      .loader-orbit {
        width: 70px;
        height: 70px;
      }
      @keyframes orbit1 {
        from { transform: rotate(0deg) translateX(30px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(30px) rotate(-360deg); }
      }
      @keyframes orbit2 {
        from { transform: rotate(120deg) translateX(42px) rotate(-120deg); }
        to   { transform: rotate(480deg) translateX(42px) rotate(-480deg); }
      }
      @keyframes orbit3 {
        from { transform: rotate(240deg) translateX(54px) rotate(-240deg); }
        to   { transform: rotate(600deg) translateX(54px) rotate(-600deg); }
      }
    }

    /* ============ Global Social Icons ============ */
    .social-icons {
      position: fixed;
      right: clamp(1.2rem, 3vw, 2.2rem);
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      pointer-events: auto;
    }

    .social-icon {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(180, 210, 240, 0.15);
      background: rgba(8, 14, 32, 0.3);
      backdrop-filter: blur(8px);
      color: rgba(200, 215, 235, 0.5);
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .social-icon:hover {
      color: rgba(255, 230, 180, 0.95);
      border-color: rgba(255, 210, 140, 0.5);
      background: rgba(255, 190, 90, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 190, 90, 0.15);
    }

    .social-icon svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .social-icon.github-icon svg {
      fill: currentColor;
      stroke: none;
    }

    .social-icons::before {
      content: '';
      display: block;
      width: 1px;
      height: 2rem;
      background: linear-gradient(to bottom, transparent, rgba(180, 210, 240, 0.2));
      margin-bottom: 0.4rem;
    }

    .social-icons::after {
      content: '';
      display: block;
      width: 1px;
      height: 2rem;
      background: linear-gradient(to top, transparent, rgba(180, 210, 240, 0.2));
      margin-top: 0.4rem;
    }



    @media (max-width: 768px) {
      .social-icons {
        right: 0.8rem;
        gap: 0.9rem;
      }
      .social-icon {
        width: 32px;
        height: 32px;
      }
      .social-icon svg {
        width: 14px;
        height: 14px;
      }

    }
  </style>
</head>

  <script>
    (() => {
      // Loading screen logic
      const loadingScreen = document.getElementById('loading-screen');
      const loaderBarFill = document.getElementById('loader-bar-fill');
      const loaderText = loadingScreen.querySelector('.loader-text');
      let loadingProgress = 0;
      let dataLoaded = false;

      function updateLoadingBar(progress) {
        loadingProgress = progress;
        if (loaderBarFill) loaderBarFill.style.width = progress + '%';
      }

      // Starfield
      const stars = [];
      const STAR_COUNT = 600;
      function initStars() {
        for (let i = 0; i < STAR_COUNT; i++) {

          stars.push({

            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinkleOffset: Math.random() * Math.PI * 2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            driftAmp: Math.random() * 0.0008 + 0.0002,

      let lastStarTime = performance.now();
      function drawStars(alpha) {
        const now = performance.now();
        const dt = Math.min(64, now - lastStarTime);
        lastStarTime = now;
        const time = now * 0.001;

        for (const s of stars) {
          s.x += s.vx * dt + Math.cos(time * s.driftFreq + s.driftPhase) * s.driftAmp * dt * 0.06;
          s.y += s.vy * dt + Math.sin(time * s.driftFreq + s.driftPhase) * s.driftAmp * dt * 0.06;

          if (s.x < -0.01) s.x = 1.01;
          else if (s.x > 1.01) s.x = -0.01;
          if (s.y < -0.01) s.y = 1.01;
          else if (s.y > 1.01) s.y = -0.01;

          const flicker = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed * 60 + s.twinkleOffset);
          const a = s.alpha * (0.5 + 0.5 * flicker) * alpha;
          if (a < 0.01) continue;
          ctx.beginPath();
          ctx.arc(s.x * width, s.y * height, s.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(220, 230, 255, ${a})`;

        }

      // ===== 3D math helpers =====
      function rotateY(x, y, z, angle) {
        const cos = Math.cos(angle), sin = Math.sin(angle);
        return { x: x * cos - z * sin, y, z: x * sin + z * cos };
      }
      function rotateX(x, y, z, angle) {
        const cos = Math.cos(angle), sin = Math.sin(angle);
        return { x, y: y * cos - z * sin, z: y * sin + z * cos };
      }
      function project(x, y, z, cx, cy, radius) {
        const scale = PERSPECTIVE / (PERSPECTIVE + z);
        return { x: cx + x * scale * radius, y: cy - y * scale * radius, z, scale };
      }
      function latLonToXYZ(lat, lon) {
        const latR = (lat * Math.PI) / 180;
        const lonR = (lon * Math.PI) / 180;
        return {
          x: Math.cos(latR) * Math.sin(lonR),
          y: Math.sin(latR),
          z: Math.cos(latR) * Math.cos(lonR)
        };
      }

      // ===== Core projection: blends sphere -> flat world map =====
      // Returns { x, y, visible, frontness }
      // - frontness: 1 = fully on front of globe, 0 = back
      // - On flat map (progress=1) frontness is forced to 1
      function projectPoint(lat, lon, cx, cy, radius, mapScale, mapCx, mapCy) {
        const t = progress;
        // Sphere position (rotated by user)
        const sph = latLonToXYZ(lat, lon);
        let r = rotateY(sph.x, sph.y, sph.z, rotation);
        r = rotateX(r.x, r.y, r.z, tilt);
        const sp = project(r.x, r.y, r.z, cx, cy, radius);
        const sphereFrontness = clamp((r.z + 0.1) / 0.4, 0, 1);

        if (t <= 0.0001) {
          return { x: sp.x, y: sp.y, frontness: sphereFrontness, sphereFrontness, mode: 'sphere' };
        }

        // Flat (equirectangular) target position centered on China
        const fx = mapCx + (lon - CHINA_CENTER_LON) * mapScale;
        const fy = mapCy - (lat - CHINA_CENTER_LAT) * mapScale;

        // Blend sphere -> flat
        const e = transitionEase();
        const x = lerp(sp.x, fx, e);
        const y = lerp(sp.y, fy, e);
        // Frontness fades to 1 as we flatten
        const frontness = lerp(sphereFrontness, 1, e);
        return { x, y, frontness, sphereFrontness, mode: t >= 0.9999 ? 'flat' : 'blend' };
      }

      // Generate latitude line points
      function getLatLine(latIndex, totalLines) {
        const lat = -90 + (180 / (totalLines + 1)) * (latIndex + 1);
        const points = [];
        for (let i = 0; i <= LINE_SEGMENTS; i++) {
          const lon = -180 + (360 * i) / LINE_SEGMENTS;
          points.push({ lat, lon });
        }
        return points;
      }
      function getLonLine(lonIndex, totalLines) {
        const lon = -180 + (360 * lonIndex) / totalLines;
        const points = [];
        for (let i = 0; i <= LINE_SEGMENTS; i++) {
          const lat = -90 + (180 * i) / LINE_SEGMENTS;
          points.push({ lat, lon });
        }
        return points;
      }

      // Pre-process GeoJSON: store lat/lon directly so the projection can blend dynamically
      function processGeoJSON(data) {
        const outlines = [];
        const china = [];
        for (const feature of data.features) {
          const geom = feature.geometry;
          if (!geom) continue;
          const isChina = String(feature.id) === '156';
          const processRing = (ring) => {
            const pts = [];
            for (const coord of ring) {
              pts.push({ lon: coord[0], lat: coord[1] });
            }
            if (isChina) china.push(pts); else outlines.push(pts);
          };
          if (geom.type === 'Polygon') {
            for (const ring of geom.coordinates) processRing(ring);
          } else if (geom.type === 'MultiPolygon') {
            for (const polygon of geom.coordinates) for (const ring of polygon) processRing(ring);
          }
        }
        return { outlines, china };
      }

      function processProvinceGeoJSON(data) {

        for (const feature of data.features || []) {
          const geom = feature.geometry;
          if (!geom) continue;

            if (pts.length > 1) {
              provinces.push(pts);
              if (isAnhui) anhui.push(pts);
              if (isHighlightedProvince) highlighted.push(pts);

      // ===== NPC Sprite Sheet =====

      // ===== Drawing helpers =====

      // Draw a 3D/blended polyline; auto-handles front/back depth on sphere
      // opts: { color, lineWidth, frontAlpha, backAlpha, strictSphereDepth }
      function drawBlendedLine(points, ctxRef, opts) {
        const t = progress;
        const { cx, cy, radius, mapScale, mapCx, mapCy } = ctxRef;
        const { color, lineWidth = 1, frontAlpha = 1, backAlpha = 0.06, drawBack = true, strictSphereDepth = false } = opts;

        // When mostly flat, treat everything as "front"
        const flatMode = !strictSphereDepth && t > 0.35;

        let frontSegs = [], backSegs = [];
        let curFront = [], curBack = [];

        for (let i = 0; i < points.length; i++) {
          const pp = points[i];
          const proj = projectPoint(pp.lat, pp.lon, cx, cy, radius, mapScale, mapCx, mapCy);
          const depth = strictSphereDepth ? proj.sphereFrontness : proj.frontness;
          const isFront = flatMode ? true : (depth > 0);
          const pt = { x: proj.x, y: proj.y };
          if (isFront) {
            curFront.push(pt);
            if (curBack.length > 0) { backSegs.push(curBack); curBack = []; }
          } else {
            curBack.push(pt);
            if (curFront.length > 0) { frontSegs.push(curFront); curFront = []; }
          }
        }
        if (curFront.length > 0) frontSegs.push(curFront);
        if (curBack.length > 0) backSegs.push(curBack);

        // Back lines (only when sphere is visible)
        if (drawBack && t < 0.6) {
          const ba = backAlpha * (1- t);
          if (ba > 0.005) {
            ctx.strokeStyle = color.replace('ALPHA', ba.toFixed(3));
            ctx.lineWidth = Math.max(0.3, lineWidth * 0.5);
            backSegs.forEach(seg => {
              if (seg.length < 2) return;
              ctx.beginPath();
              ctx.moveTo(seg[0].x, seg[0].y);
              for (let i = 1; i < seg.length; i++) ctx.lineTo(seg[i].x, seg[i].y);
              ctx.stroke();
            });
          }
        }

        // Front lines
        const fa = frontAlpha;
        if (fa > 0.005) {
          ctx.strokeStyle = color.replace('ALPHA', fa.toFixed(3));
          ctx.lineWidth = lineWidth;
          frontSegs.forEach(seg => {
            if (seg.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(seg[0].x, seg[0].y);
            for (let i = 1; i < seg.length; i++) ctx.lineTo(seg[i].x, seg[i].y);
            ctx.stroke();
          });
        }
      }

      // ===== Pixel Castle Icon =====
      // Draws a tiny 8x10 pixel-art castle icon at (x, y) using filled rects
      // Pixel size = ps, alpha multiplier = vis
      function drawCastleIcon(x, y, ps, vis) {
        const a = vis;
        // Color palette
        const wall   = `rgba(160, 180, 210, ${a.toFixed(3)})`;
        const tower  = `rgba(120, 145, 185, ${a.toFixed(3)})`;
        const roof   = `rgba(255, 200, 120, ${a.toFixed(3)})`;
        const window = `rgba(255, 210, 140, ${(a * 0.8).toFixed(3)})`;
        const gate   = `rgba(60, 50, 40, ${(a * 0.9).toFixed(3)})`;
        const flag   = `rgba(255, 100, 80, ${a.toFixed(3)})`;

        ctx.save();
        ctx.imageSmoothingEnabled = false;

        // Left tower (2w x 5h)
        ctx.fillStyle = tower;
        ctx.fillRect(x - 4*ps, y - 9*ps, 2*ps, 5*ps);
        ctx.fillStyle = roof;
        ctx.fillRect(x - 5*ps, y - 10*ps, 4*ps, 1*ps);
        ctx.fillStyle = flag;
        ctx.fillRect(x - 4*ps, y - 12*ps, 1*ps, 2*ps);

        // Right tower (2w x 5h)
        ctx.fillStyle = tower;
        ctx.fillRect(x + 2*ps, y - 9*ps, 2*ps, 5*ps);
        ctx.fillStyle = roof;
        ctx.fillRect(x + 1*ps, y - 10*ps, 4*ps, 1*ps);
        ctx.fillStyle = flag;
        ctx.fillRect(x + 3*ps, y - 12*ps, 1*ps, 2*ps);

        // Main wall (4w x 3h)
        ctx.fillStyle = wall;
        ctx.fillRect(x - 2*ps, y - 7*ps, 4*ps, 3*ps);

        // Battlement tops on wall (3 blocks)
        ctx.fillStyle = wall;
        ctx.fillRect(x - 2*ps, y - 8*ps, 1*ps, 1*ps);
        ctx.fillRect(x,         y - 8*ps, 1*ps, 1*ps);
        ctx.fillRect(x + 2*ps,  y - 8*ps, 1*ps, 1*ps);

        // Windows (center tower, 2 tiny windows)
        ctx.fillStyle = window;
        ctx.fillRect(x - 1*ps, y - 6*ps, 1*ps, 1*ps);
        ctx.fillRect(x + 1*ps, y - 6*ps, 1*ps, 1*ps);

        // Tower windows (left & right)
        ctx.fillStyle = window;
        ctx.fillRect(x - 4*ps, y - 8*ps, 1*ps, 1*ps);
        ctx.fillRect(x + 2*ps, y - 8*ps, 1*ps, 1*ps);

        // Gate arch (2w x 2h)
        ctx.fillStyle = gate;
        ctx.fillRect(x - 1*ps, y - 4*ps, 2*ps, 2*ps);

        // Ground shadow
        ctx.fillStyle = `rgba(0, 0, 0, ${(a * 0.2).toFixed(3)})`;
        ctx.fillRect(x - 5*ps, y, 10*ps, 1*ps);

        ctx.restore();
      }

      // Draw castle markers for each city on the flat map (page 2)
      function drawCityCastles(ctxRef) {
        const t = progress;
        if (t < 0.42) return;
        const appear = smoothRange(0.42, 0.88, t);
        if (appear < 0.01) return;
        const { cx, cy, radius, mapScale, mapCx, mapCy } = ctxRef;
        const time = performance.now() * 0.001;

        const ps = 3.0; // pixel size for castle

        for (const city of castleCities) {
          const proj = projectPoint(city.lat, city.lon, cx, cy, radius, mapScale, mapCx, mapCy);
          if (proj.frontness <= 0.05) continue;
          const px = proj.x;
          const py = proj.y;
          const vis = appear * proj.frontness;
          if (vis < 0.05) continue;

          // Gentle bob animation
          const bob = Math.sin(time * 2.0 + city.lat * 10) * 1.5 * vis;

          // Small glow under castle
          const glowR = 14;
          const grd = ctx.createRadialGradient(px, py + bob, 0, px, py + bob, glowR);
          grd.addColorStop(0, `rgba(120, 180, 255, ${(0.25 * vis).toFixed(3)})`);
          grd.addColorStop(1, 'rgba(120, 180, 255, 0)');
          ctx.beginPath();
          ctx.arc(px, py + bob, glowR, 0, Math.PI * 2);
          ctx.fillStyle = grd;
          ctx.fill();

          // Draw castle icon
          drawCastleIcon(px, py + bob, ps, vis);

          // City name label
          ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
          ctx.shadowBlur = 6;
          ctx.font = `600 11px "FreePixel", monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillStyle = `rgba(180, 210, 240, ${(0.85 * vis).toFixed(3)})`;
          ctx.fillText(city.enName, px, py + 4*ps + bob);
          ctx.shadowBlur = 0;
        }
      }

      // Draw page-1 highlight cities. Fade out as progress increases.
      function drawCityPoints(ctxRef) {
        const t = progress;
        if (t > 0.4) return; // hidden once transitioning to map
        const fade = 1 - clamp(t / 0.4, 0, 1);
        const { cx, cy, radius, mapScale, mapCx, mapCy } = ctxRef;
        const time = performance.now() * 0.001;

        for (const city of highlightCities) {
          const proj = projectPoint(city.lat, city.lon, cx, cy, radius, mapScale, mapCx, mapCy);
          if (proj.frontness <= 0) continue;
          const p = { x: proj.x, y: proj.y };
          const vis = proj.frontness * fade;
          const pulse = 0.6 + 0.4 * Math.sin(time * 2.5 + city.lat);

          if (vis > 0.05) {
            const dx = city.dir.dx;
            const dy = city.dir.dy;
            const len = Math.hypot(dx, dy) || 1;
            const startGap = 6;
            const sx = p.x + (dx / len) * startGap;
            const sy = p.y + (dy / len) * startGap;
            const tailLen = dx >= 0 ? 95 : -95;
            const bx = p.x + dx;
            const by = p.y + dy;
            const ex = bx + tailLen;
            const ey = by;

            ctx.strokeStyle = `rgba(255, 210, 140, ${(0.7 * vis).toFixed(3)})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(bx, by);
            ctx.lineTo(ex, ey);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(bx, by, 1.6, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 230, 180, ${(0.9 * vis).toFixed(3)})`;
            ctx.fill();

            const labelPadX = 8;
            const labelY = ey - 8;
            const align = dx >= 0 ? 'left' : 'right';
            const tx = dx >= 0 ? ex - tailLen + labelPadX : ex - tailLen - labelPadX;
            ctx.font = '600 16px "FreePixel", monospace';
            ctx.textAlign = align;
            ctx.textBaseline = 'alphabetic';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.85)';
            ctx.shadowBlur = 8;
            ctx.fillStyle = `rgba(255, 240, 210, ${(0.95 * vis).toFixed(3)})`;
            ctx.fillText(city.enName, tx, labelY);
            ctx.shadowBlur = 0;
          }

          const glowRadius = 8 * pulse;
          const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowRadius);
          gradient.addColorStop(0, `rgba(255, 200, 80, ${(0.9 * fade).toFixed(3)})`);
          gradient.addColorStop(0.3, `rgba(255, 160, 50, ${(0.5 * fade).toFixed(3)})`);
          gradient.addColorStop(0.7, `rgba(255, 120, 30, ${(0.15 * fade).toFixed(3)})`);
          gradient.addColorStop(1, 'rgba(255, 100, 20, 0)');
          ctx.beginPath();
          ctx.arc(p.x, p.y, glowRadius, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();

          ctx.beginPath();
          ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 240, 200, ${(0.95 * fade).toFixed(3)})`;
          ctx.fill();

          const ringRadius = 5 + 4 * pulse;
          ctx.beginPath();
          ctx.arc(p.x, p.y, ringRadius, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 180, 60, ${(0.4 * pulse * fade).toFixed(3)})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }

      // Draw the focus city (Fuyang) on page 2. Fades in with progress.
      function drawFocusCity(ctxRef) {
        const t = progress;
        if (t < 0.36) return;
        const appear = smoothRange(0.36, 0.82, t);
        if (appear < 0.01) return;
        const { cx, cy, radius, mapScale, mapCx, mapCy } = ctxRef;
        const proj = projectPoint(focusCity.lat, focusCity.lon, cx, cy, radius, mapScale, mapCx, mapCy);
        const p = { x: proj.x, y: proj.y };
        const time = performance.now() * 0.001;
        const pulse = 0.6 + 0.4 * Math.sin(time * 2.0);

        // Expanding ripple rings
        for (let i = 0; i < 3; i++) {
          const phase = (time * 0.6 + i / 3) % 1;
          const ringR = lerp(6, 60, phase);
          const ringA = (1 - phase) * 0.5 * appear;
          if (ringA <= 0.01) continue;
          ctx.beginPath();
          ctx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 200, 120, ${ringA.toFixed(3)})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }

        // Big glow
        const glowR = 32 * (0.85 + 0.15 * pulse) * appear;
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
        grad.addColorStop(0, `rgba(255, 220, 130, ${(0.9 * appear).toFixed(3)})`);
        grad.addColorStop(0.25, `rgba(255, 180, 80, ${(0.5 * appear).toFixed(3)})`);
        grad.addColorStop(0.6, `rgba(255, 140, 50, ${(0.15 * appear).toFixed(3)})`);
        grad.addColorStop(1, 'rgba(255, 100, 30, 0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Core dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 245, 220, ${appear.toFixed(3)})`;
        ctx.fill();


      }

      

      // Draw animated pixel NPC sprite at Fuyang on page 2
      function drawHighlightCityIcons(ctxRef) {
        const t = progress;
        if (t < 0.36) return;
        const appear = smoothRange(0.36, 0.82, t);
        if (appear < 0.01) return;
        if (!npcReady) return;
        const { cx, cy, radius, mapScale, mapCx, mapCy } = ctxRef;
        const time = performance.now() * 0.001;

        // Only draw for Fuyang
        const city = focusCity;
        const proj = projectPoint(city.lat, city.lon, cx, cy, radius, mapScale, mapCx, mapCy);
        if (proj.frontness <= 0) return;
        const px = proj.x;
        const py = proj.y;
        const vis = appear * proj.frontness;
        if (vis < 0.05) return;

        // Walk animation timing
        walkTimer += 1;
        if (walkTimer % 9 === 0) {
          walkIndex = (walkIndex + 1) % WALK_FRAMES.length;
        }
        const frame = WALK_FRAMES[walkIndex];

        // Direction: down (front-facing)
        const dirRow = 0;

        // Source coordinates in sprite sheet
        const sx = CHAR_BASE_X + frame * FRAME_W;
        const sy = CHAR_BASE_Y + dirRow * FRAME_H;

        // Draw scale (16x16 -> 48x48 for visibility)
        const drawScale = 3.0;
        const drawW = FRAME_W * drawScale;
        const drawH = FRAME_H * drawScale;

        // Bob animation
        const bobY = Math.sin(time * 2.8) * 2.5 * vis;

        // Store NPC screen position for click detection
        npcScreenX = px;
        npcScreenY = py - drawH / 2 + bobY;
        npcDrawW = drawW;
        npcDrawH = drawH;

        // Dialog alpha animation
        npcDialogAlpha += (npcDialogTargetAlpha - npcDialogAlpha) * 0.12;

        ctx.save();
        ctx.globalAlpha = vis;

        // Glow under NPC
        const glowR = 24;
        const grd = ctx.createRadialGradient(px, py, 0, px, py, glowR);
        grd.addColorStop(0, 'rgba(255, 200, 100, 0.35)');
        grd.addColorStop(0.5, 'rgba(255, 160, 60, 0.12)');
        grd.addColorStop(1, 'rgba(255, 120, 30, 0)');
        ctx.beginPath();
        ctx.arc(px, py, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Disable smoothing for pixel-perfect rendering
        const prevSmoothing = ctx.imageSmoothingEnabled;
        ctx.imageSmoothingEnabled = false;

        // Draw the sprite frame
        ctx.drawImage(
          npcImg,
          sx, sy, FRAME_W, FRAME_H,
          px - drawW / 2, py - drawH + bobY, drawW, drawH
        );

        // Restore smoothing
        ctx.imageSmoothingEnabled = prevSmoothing;

        // Name label below NPC
        ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
        ctx.shadowBlur = 6;
        ctx.font = '600 13px "FreePixel", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillStyle = 'rgba(255, 240, 210, 0.9)';
        ctx.fillText('Fuyang, Anhui', px, py + 4 + bobY);
        ctx.shadowBlur = 0;

        // ===== Speech Bubble (Chat Bubble Shape) =====
        // Determine the text content to measure width
        const fontSize = 19;
        ctx.font = `600 ${fontSize}px "FreePixel", monospace`;
        let bubbleText = '';
        if (npcDialogIndex >= 0 && npcDialogIndex < npcDialogMessages.length) {
          bubbleText = npcDialogMessages[npcDialogIndex]();
        }

        // Measure text width for auto-sizing
        const textMetrics = ctx.measureText(bubbleText);
        const textWidth = textMetrics.width;
        const paddingX = 22;
        const paddingY = 14;
        const minBubbleW = 70;
        const bubbleW = Math.max(minBubbleW, textWidth + paddingX * 2);
        const bubbleH = fontSize + paddingY * 2;
        const cornerRadius = 14;

        // Bubble position
        const bubbleX = px - bubbleW / 2;
        const bubbleY = py - drawH + bobY - bubbleH - 16;

        // Bubble bob
        const bubbleBob = Math.sin(time * 2.0) * 2;
        const by = bubbleY + bubbleBob;

        // ===== Draw chat bubble shape =====
        // A rounded rectangle bubble with a triangular tail pointing down
        const tailWidth = 12;
        const tailHeight = 10;

        ctx.save();
        ctx.beginPath();

        // Rounded rectangle (top-left, top-right, bottom-right, bottom-left corners)
        const bx = bubbleX;
        const bBottom = by + bubbleH;
        // Top-left corner
        ctx.moveTo(bx + cornerRadius, by);
        ctx.lineTo(bx + bubbleW - cornerRadius, by);
        ctx.arcTo(bx + bubbleW, by, bx + bubbleW, by + cornerRadius, cornerRadius);
        // Top-right corner
        ctx.lineTo(bx + bubbleW, bBottom - cornerRadius);
        ctx.arcTo(bx + bubbleW, bBottom, bx + bubbleW - cornerRadius, bBottom, cornerRadius);
        // Bottom-right to tail start
        ctx.lineTo(px + tailWidth / 2, bBottom);
        // Tail triangle (pointing down to NPC)
        ctx.lineTo(px, bBottom + tailHeight);
        ctx.lineTo(px - tailWidth / 2, bBottom);
        // Bottom-left corner
        ctx.lineTo(bx + cornerRadius, bBottom);
        ctx.arcTo(bx, bBottom, bx, bBottom - cornerRadius, cornerRadius);
        // Left side
        ctx.lineTo(bx, by + cornerRadius);
        ctx.arcTo(bx, by, bx + cornerRadius, by, cornerRadius);

        ctx.closePath();
        ctx.fillStyle = 'rgba(8, 14, 32, 0.82)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(180, 210, 240, 0.35)';
        ctx.lineWidth = 1.2;
        ctx.stroke();

        ctx.restore();

        // ===== Draw bubble text =====
        if (npcDialogIndex >= 0 && npcDialogIndex < npcDialogMessages.length) {
          const textAlpha = Math.min(1, npcDialogAlpha);
          ctx.font = `600 ${fontSize}px "FreePixel", monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = 'rgba(0, 0, 0, 0.85)';
          ctx.shadowBlur = 4;
          ctx.fillStyle = `rgba(255, 240, 210, ${textAlpha.toFixed(3)})`;
          ctx.fillText(bubbleText, bubbleX + bubbleW / 2, by + bubbleH / 2);
          ctx.shadowBlur = 0;
        } else if (npcDialogIndex < 0) {
          // Blank bubble: animated dots
          const dotR = 3;
          const dotSpacing = 10;
          const bubbleCx = bubbleX + bubbleW / 2;
          const bubbleCy = by + bubbleH / 2;
          const dotsStartX = bubbleCx - 1 * dotSpacing;
          const dotBaseY = bubbleCy;
          for (let i = 0; i < 3; i++) {
            const dotPhase = Math.sin(time * 3.0 + i * 0.8);
            const dotAlpha = 0.25 + 0.45 * (0.5 + 0.5 * dotPhase);
            const dotOffY = dotPhase * 2.5;
            ctx.beginPath();
            ctx.arc(dotsStartX + i * dotSpacing, dotBaseY + dotOffY, dotR, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 210, 240, ${dotAlpha.toFixed(3)})`;
            ctx.fill();
          }
        }

        // Click hint (subtle pulse around NPC)
        const hintPulse = 0.5 + 0.5 * Math.sin(time * 2.5);
        ctx.beginPath();
        ctx.arc(px, py - drawH / 2 + bobY, drawW / 2 + 8, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 210, 140, ${(0.15 * hintPulse).toFixed(3)})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.restore();
      }

      // Optional sphere glow + outline (only when sphere is visible)
      function drawGlobeChrome(cx, cy, radius) {
        const t = progress;
        if (t > 0.5) return;
        const alpha = 1 - clamp(t / 0.7, 0, 1);
        // Soft outer glow
        const gradient = ctx.createRadialGradient(cx, cy, radius * 0.8, cx, cy, radius * 1.5);
        gradient.addColorStop(0, `rgba(100, 140, 200, ${(0.04 * alpha).toFixed(3)})`);
        gradient.addColorStop(1, 'rgba(100, 140, 200, 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        // Rim
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(200, 210, 220, ${(0.15 * alpha).toFixed(3)})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // ===== Main draw loop =====
      function computeViewParams() {
        const minDim = Math.min(width, height);
        const radius = minDim * GLOBE_RADIUS_RATIO;
        // Sphere center (page 1)
        const sphereCx = width * 0.58;
        const sphereCy = height * 0.5;
        // Flat-map center (page 2): shifted right to avoid overlapping left UI
        const flatCx = width * 0.54;
        const flatCy = height * 0.5;

        // Camera follows the blend
        const e = transitionEase();
        const cx = lerp(sphereCx, flatCx, e);
        const cy = lerp(sphereCy, flatCy, e);

        // Flat-map scale: zoom into Beijing–Shanghai–Anhui–Zhejiang region
        const CHINA_LON_SPAN = CHINA_BOUNDS.maxLon - CHINA_BOUNDS.minLon;
        const CHINA_LAT_SPAN = CHINA_BOUNDS.maxLat - CHINA_BOUNDS.minLat;
        const fitW = (width * 0.82) / CHINA_LON_SPAN;
        const fitH = (height * 0.88) / CHINA_LAT_SPAN;
        const mapScale = Math.min(fitW, fitH);

        return { cx, cy, radius, mapScale, mapCx: flatCx, mapCy: flatCy };
      }

      function draw() {
        const now = performance.now();
        const dt = Math.min(48, now - lastFrameTime) / 1000;
        lastFrameTime = now;

        // Frame-rate independent damping toward the scroll-driven target.
        const progressBlend = 1 - Math.exp(-PROGRESS_DAMPING * dt);
        progress += (targetProgress - progress) * progressBlend;
        if (Math.abs(progress - targetProgress) < 0.0003) progress = targetProgress;

        if (transitionDirection < 0 && progress < 0.18 && visualPage !== 0) {
          visualPage = 0;
          updatePageUI();
        } else if (transitionDirection > 0 && progress > 0.28 && visualPage < 1) {
          visualPage = 1;
          updatePageUI();
        }
        if (progress === targetProgress) transitionDirection = 0;

        ctx.clearRect(0, 0, width, height);

        // Stars: fade out completely on the map page
        const starAlpha = 1 - smoothRange(0.1, 0.7, progress);
        drawStars(starAlpha);

        const view = computeViewParams();

        drawGlobeChrome(view.cx, view.cy, view.radius);

        // Grid lines: visible on sphere, fade out quickly before flat map
        const gridAlpha = 1 - smoothRange(0.02, 0.15, progress);
        if (gridAlpha > 0.01) {
          const baseAlpha = 0.18 * gridAlpha;
          for (let i = 0; i < LAT_LINES; i++) {
            drawBlendedLine(getLatLine(i, LAT_LINES), view, {
              color: 'rgba(180, 195, 220, ALPHA)',
              lineWidth: 0.5,
              frontAlpha: baseAlpha,
              backAlpha: 0.04 * gridAlpha
            });
          }
          for (let i = 0; i < LON_LINES; i++) {
            drawBlendedLine(getLonLine(i, LON_LINES), view, {
              color: 'rgba(180, 195, 220, ALPHA)',
              lineWidth: 0.5,
              frontAlpha: baseAlpha,
              backAlpha: 0.04 * gridAlpha
            });
          }
        }

        // Other countries: fade during transition, subtle on flat map
        const otherAlphaSphere = (1 - smoothRange(0.18, 0.74, progress)) * 0.5;
        const otherAlphaFlat = smoothRange(0.5, 0.85, progress) * 0.06;
        const otherAlpha = otherAlphaSphere + otherAlphaFlat;
        if (otherAlpha > 0.01) {
          for (const outline of countryOutlines) {
            drawBlendedLine(outline, view, {
              color: 'rgba(160, 195, 240, ALPHA)',
              lineWidth: 1.0,
              frontAlpha: otherAlpha,
              backAlpha: 0,
              drawBack: false,
              strictSphereDepth: progress < 0.5
            });
          }
        }

        // China — always present, emphasized as we flatten
        drawChina(view);
        drawGlobeProvinceOutlines(view);
        drawProvinceOutlines(view);
        drawAnhuiHighlight(view);
        drawCityOutlines(view);
        drawFuyangCityHighlight(view);

        // City highlights (sphere) + focus city (flat)
        drawCityPoints(view);
        drawFocusCity(view);
        drawCityCastles(view);
        drawHighlightCityIcons(view);

        // Globe rotation behavior
        const TWO_PI = Math.PI * 2;
        const flatten = transitionEase();
        const swingRestore = 1 - smoothRange(0.02, 0.36, progress);
        const tt = (performance.now() - swingStart) / SWING_PERIOD;
        const idleRotation = INITIAL_ROTATION + Math.sin(tt * Math.PI * 2) * SWING_AMPLITUDE;
        const targetRotation = !hasInteracted ? lerp(INITIAL_ROTATION, idleRotation, swingRestore) : INITIAL_ROTATION;
        let diff = ((targetRotation - rotation) % TWO_PI + TWO_PI + Math.PI) % TWO_PI - Math.PI;

        if (!isDragging) {
          if (progress < 0.08 && Math.abs(velocityRot) > 1e-5) {
            rotation += velocityRot;
            velocityRot *= INERTIA_DAMPING;
          } else {
            velocityRot = 0;
            const easeFactor = lerp(0.018, 0.075, flatten);
            rotation += diff * easeFactor;
          }
        }
        tilt += (lerp(0.35, 0.05, flatten) - tilt) * lerp(0.025, 0.085, flatten);

        requestAnimationFrame(draw);
      }

      // Start: load data then animate
      loadGeoData().then(() => {
        updateLoadingBar(95);
        // Wait for fonts to be ready before revealing
        const reveal = () => {
          hideLoadingScreen();
          draw();
        };
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(reveal);
        } else {
          setTimeout(reveal, 100);
        }
      });
    })();
  </script>
</body>
</html>
